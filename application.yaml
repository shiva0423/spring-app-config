eureka:
  instance:
    prefer-ip-address: true

  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: ${EUREKA_SERVER_ADDRESS:http://localhost:8761/eureka}


spring:
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: order-service
              uri: lb://OrderService
              predicates:
                - Path=/order/**

            - id: product-service
              uri: lb://ProductService
              predicates:
                - Path=/product/**

            - id: payment-service
              uri: lb://PaymentService
              predicates:
                - Path=/payment/**
